<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditorium</title>

    <!-- All assets are local — no outbound requests -->
    <link rel="stylesheet" href="/static/theme.css">
    <link rel="stylesheet" href="/static/vendor/katex/katex.min.css">
    <link rel="stylesheet" href="/static/vendor/hljs/styles/github.min.css">
    <script src="/static/vendor/katex/katex.min.js"></script>
    <script src="/static/vendor/katex/contrib/auto-render.min.js"></script>
    <script src="/static/vendor/hljs/highlight.min.js"></script>
</head>
<body>
    <div id="slide-root"></div>

    <div id="slide-indicator"></div>
    <div id="connection-status"></div>

    <script>
    (function() {
        const root = document.getElementById('slide-root');
        const indicator = document.getElementById('slide-indicator');
        const statusEl = document.getElementById('connection-status');
        let ws = null;
        let targetStack = [root];

        function currentTarget() {
            return targetStack[targetStack.length - 1];
        }

        function getSlideFromHash() {
            const match = location.hash.match(/#slide-(\d+)/);
            return match ? parseInt(match[1], 10) : 0;
        }

        function setStatus(state) {
            const dot = '<span class="aud-dot aud-dot-' + state + '"></span>';
            statusEl.innerHTML = dot;
        }

        const SLIDE_ROOT_RESET = 'aud-slide-root';

        function resetRoot() {
            root.innerHTML = '';
            root.className = SLIDE_ROOT_RESET;
            targetStack = [root];
        }

        function connect() {
            setStatus('connecting');
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws`);

            ws.onopen = function() {
                setStatus('connected');
                const params = new URLSearchParams(location.search);
                const hello = { type: 'hello', slide: getSlideFromHash() };
                const autoStep = params.get('auto_step');
                if (autoStep) hello.auto_step = parseFloat(autoStep);
                const slideDelay = params.get('slide_delay');
                if (slideDelay) hello.slide_delay = parseFloat(slideDelay);
                ws.send(JSON.stringify(hello));
            };

            ws.onmessage = function(event) {
                const msg = JSON.parse(event.data);
                handleMessage(msg);
            };

            ws.onclose = function() {
                setStatus('disconnected');
                setTimeout(connect, 1000);
            };

            ws.onerror = function(err) {
                console.error('[auditorium] websocket error', err);
                ws.close();
            };
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'mutation':
                    applyMutation(msg);
                    break;
                case 'clear':
                    resetRoot();
                    break;
                case 'slide':
                    location.hash = `#slide-${msg.index}`;
                    indicator.textContent = msg.total ? `${msg.index + 1} / ${msg.total}` : `${msg.index + 1}`;
                    break;
                case 'reload':
                    location.hash = `#slide-${msg.slide}`;
                    resetRoot();
                    break;
                case 'finished':
                    window.__auditorium_finished = true;
                    break;
            }
        }

        function applyMutation(msg) {
            const target = msg.target ? document.querySelector(msg.target) : currentTarget();
            switch (msg.action) {
                case 'append': {
                    const wrapper = document.createElement('div');
                    wrapper.innerHTML = msg.html;
                    const el = wrapper.firstElementChild || wrapper;
                    if (msg.element_id) {
                        el.id = msg.element_id;
                    }
                    if (target) {
                        // FLIP: snapshot positions of existing siblings before DOM change
                        const siblings = Array.from(target.children);
                        const beforeRects = new Map();
                        siblings.forEach(s => beforeRects.set(s, s.getBoundingClientRect()));

                        target.appendChild(el);

                        // Animate the new element in
                        el.classList.add('aud-enter');
                        el.addEventListener('animationend', () => el.classList.remove('aud-enter'), { once: true });

                        // FLIP: animate existing siblings from old position to new
                        siblings.forEach(s => {
                            const before = beforeRects.get(s);
                            const after = s.getBoundingClientRect();
                            const dx = before.left - after.left;
                            const dy = before.top - after.top;
                            if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
                                s.style.transition = 'none';
                                s.style.transform = `translate(${dx}px, ${dy}px)`;
                                requestAnimationFrame(() => {
                                    requestAnimationFrame(() => {
                                        s.style.transition = 'transform 0.3s ease';
                                        s.style.transform = '';
                                        s.addEventListener('transitionend', () => {
                                            s.style.transition = '';
                                        }, { once: true });
                                    });
                                });
                            }
                        });
                    }
                    renderMath(el);
                    renderCode(el);
                    break;
                }
                case 'remove': {
                    const el = document.querySelector(msg.selector);
                    if (el) el.remove();
                    break;
                }
                case 'replace': {
                    const el = document.querySelector(msg.selector);
                    if (el) {
                        el.innerHTML = msg.html;
                        renderMath(el);
                        renderCode(el);
                    }
                    break;
                }
                case 'set_class': {
                    const el = document.querySelector(msg.selector);
                    if (el) el.classList.add(...msg.cls.split(' '));
                    break;
                }
                case 'remove_class': {
                    const el = document.querySelector(msg.selector);
                    if (el) el.classList.remove(...msg.cls.split(' '));
                    break;
                }
                case 'push_target': {
                    const el = document.querySelector(msg.selector);
                    if (el) targetStack.push(el);
                    break;
                }
                case 'pop_target': {
                    if (targetStack.length > 1) targetStack.pop();
                    break;
                }
            }
            if (msg.id && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'ack', id: msg.id }));
            }
        }

        function renderMath(el) {
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(el, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                    ],
                    throwOnError: false,
                });
            }
        }

        function renderCode(el) {
            if (typeof hljs !== 'undefined') {
                el.querySelectorAll('pre code').forEach(block => {
                    hljs.highlightElement(block);
                });
            }
        }

        document.addEventListener('keydown', function(e) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const key = e.key;
                if (['ArrowRight', 'ArrowLeft', 'PageDown', ' ', 'r'].includes(key) ||
                    (key >= '0' && key <= '9') || key === 'Enter') {
                    e.preventDefault();
                    ws.send(JSON.stringify({ type: 'keypress', key: key }));
                }
            }
        });

        connect();
    })();
    </script>
</body>
</html>
